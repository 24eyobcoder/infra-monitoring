<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraWatch — Alert Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14; --panel:#10151e; --panel-2:#151b26; --line:#1d2531; --line-2:#2a3543;
    --text:#e4e9f0; --dim:#7d8a9c; --faint:#4a5564;
    --brand:#38bdf8;
    --up:#34d399; --up-bg:rgba(52,211,153,.12);
    --slow:#fbbf24; --slow-bg:rgba(251,191,36,.12);
    --down:#f87171; --down-bg:rgba(248,113,113,.13);
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --topbar-bg:rgba(10,14,20,.85);
  }
  [data-theme="light"]{
    --bg:#f4f6f9; --panel:#ffffff; --panel-2:#eef2f7; --line:#e2e7ee; --line-2:#cbd4df;
    --text:#1a2230; --dim:#5b6675; --faint:#9aa5b4;
    --brand:#0284c7;
    --up:#059669; --up-bg:rgba(5,150,105,.10);
    --slow:#b45309; --slow-bg:rgba(217,119,6,.13);
    --down:#dc2626; --down-bg:rgba(220,38,38,.10);
    --topbar-bg:rgba(244,246,249,.85);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;line-height:1.4;padding-bottom:60px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  a{color:var(--brand);text-decoration:none}

  .topbar{border-bottom:1px solid var(--line);background:var(--topbar-bg);
    backdrop-filter:blur(8px);position:sticky;top:0;z-index:10}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:62px}
  .brand{display:flex;align-items:center;gap:12px}
  .radar{width:32px;height:32px;border-radius:8px;background:linear-gradient(145deg,#0b3a52,#0a2230);
    border:1px solid #134b69;display:grid;place-items:center}
  .brand h1{font-size:16px;font-weight:600;letter-spacing:-.2px}
  .brand .sub{font-size:11px;color:var(--faint);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
  .right{display:flex;align-items:center;gap:14px}
  .navlink{font-size:13px;color:var(--dim);font-family:var(--mono)}
  .navlink:hover{color:var(--text)}
  .tbtn{background:var(--panel);border:1px solid var(--line);color:var(--dim);width:34px;height:34px;
    border-radius:9px;cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.15s}
  .tbtn:hover{color:var(--text);border-color:var(--line-2)}

  .pagehead{margin:24px 0 18px}
  .pagehead h2{font-size:20px;font-weight:600;letter-spacing:-.3px}
  .pagehead .meta{font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:5px}

  /* filters */
  .filters{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel)}
  .seg button{background:none;border:none;color:var(--dim);padding:8px 14px;font-size:12.5px;cursor:pointer;
    font-family:'Archivo',sans-serif;font-weight:500;transition:.15s}
  .seg button:hover{color:var(--text)} .seg button.on{background:var(--panel-2);color:var(--text)}
  .filters .grow{flex:1}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:9px;
    padding:8px 14px;font-size:12.5px;font-family:'Archivo',sans-serif;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--line-2)}

  /* tiles */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
  .tile::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--faint)}
  .tile.t-crit::before{background:var(--down)} .tile.t-warn::before{background:var(--slow)} .tile.t-host::before{background:var(--brand)}
  .tile .n{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1}
  .tile.t-crit .n{color:var(--down)} .tile.t-warn .n{color:var(--slow)} .tile.t-host .n{color:var(--brand)}
  .tile .l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:8px;font-family:var(--mono)}

  /* two-column panels */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .panel h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-family:var(--mono);font-size:12.5px}
  .bar-row .lbl{width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .bar-row .track{flex:1;height:9px;background:var(--panel-2);border-radius:5px;overflow:hidden}
  .bar-row .fill{height:100%;background:var(--brand);border-radius:5px}
  .bar-row .fill.crit{background:var(--down)} .bar-row .fill.warn{background:var(--slow)}
  .bar-row .v{width:34px;text-align:right;color:var(--dim)}
  .day-row .lbl{width:96px}

  /* table */
  .tbl-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .tbl-head h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
  .tbl-head .gline{flex:1;height:1px;background:var(--line)}
  .tbl-head .cnt{font-family:var(--mono);font-size:11px;color:var(--faint)}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th{text-align:left;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--faint);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--panel-2)}
  td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr.dismissed{opacity:.5}
  .when{font-family:var(--mono);font-size:11.5px;color:var(--dim);white-space:nowrap}
  .host{font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap}
  .ttl{color:var(--dim);font-size:12px}
  .sum{color:var(--text);max-width:480px}
  .sev{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
    padding:3px 8px;border-radius:20px;white-space:nowrap}
  .sev.critical{color:var(--down);background:var(--down-bg)}
  .sev.warning{color:var(--slow);background:var(--slow-bg)}
  .sev.unknown,.sev.info{color:var(--dim);background:var(--panel-2)}
  .tag{font-family:var(--mono);font-size:9.5px;color:var(--faint);border:1px solid var(--line-2);
    padding:1px 6px;border-radius:20px;margin-left:6px}
  .empty{text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px;padding:50px 0}
</style>
</head>
<body>

<div class="topbar"><div class="wrap">
  <div class="brand">
    <div class="radar">📊</div>
    <div><h1>InfraWatch</h1><div class="sub">Alert Report</div></div>
  </div>
  <div class="right">
    <a class="navlink" href="/">← Dashboard</a>
    <button class="tbtn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">☀</button>
  </div>
</div></div>

<div class="wrap">
  <div class="pagehead">
    <h2>Alert Report</h2>
    <div class="meta" id="range-meta">Loading…</div>
  </div>

  <div class="filters">
    <div class="seg" id="presets">
      <button data-d="1">24h</button>
      <button data-d="7" class="on">7 days</button>
      <button data-d="30">30 days</button>
      <button data-d="0">All time</button>
    </div>
    <div class="grow"></div>
    <button class="btn" onclick="downloadCsv()">Export CSV</button>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="cols">
    <div class="panel"><h3>By host</h3><div id="byHost"></div></div>
    <div class="panel"><h3>Daily trend</h3><div id="byDay"></div></div>
  </div>

  <div class="tbl-head"><h3>Alerts</h3><div class="gline"></div><span class="cnt" id="tbl-cnt"></span></div>
  <div id="table-wrap"></div>
</div>

<script>
// ---- theme (shared with the dashboard) ----
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('iw-theme', t); }catch(e){}
  const btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = (t === 'light') ? '☾' : '☀';
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
(function(){ let s; try{ s = localStorage.getItem('iw-theme'); }catch(e){} applyTheme(s || 'dark'); })();

let days = 7;          // current preset (0 = all time)
let current = null;    // last report payload

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(iso){ return iso ? iso.replace('T',' ').slice(0,19) + ' UTC' : '—'; }

async function load(){
  let url = '/api/report';
  if(days > 0){
    const from = new Date(Date.now() - days*86400000).toISOString();
    url += '?from=' + encodeURIComponent(from);
  }
  try{
    const res = await fetch(url);
    current = await res.json();
    render(current);
  }catch(err){
    document.getElementById('range-meta').textContent = 'Failed to load report';
  }
}

function render(r){
  const sev = Object.fromEntries((r.bySeverity||[]).map(s => [s.severity, s.n]));
  const crit = sev.critical || 0, warn = sev.warning || 0;
  const hosts = (r.byHost || []).length;

  document.getElementById('range-meta').textContent =
    (days > 0 ? 'Last ' + days + ' day' + (days>1?'s':'') : 'All time') +
    ' · ' + (r.total||0) + ' alerts · ' +
    (r.range && r.range.first ? fmt(r.range.first) + ' → ' + fmt(r.range.last) : 'no data');

  document.getElementById('tiles').innerHTML = `
    <div class="tile"><div class="n">${r.total||0}</div><div class="l">Total alerts</div></div>
    <div class="tile t-crit"><div class="n">${crit}</div><div class="l">Critical</div></div>
    <div class="tile t-warn"><div class="n">${warn}</div><div class="l">Warning</div></div>
    <div class="tile t-host"><div class="n">${hosts}</div><div class="l">Hosts affected</div></div>`;

  // by host (horizontal bars, scaled to the busiest host)
  const maxHost = Math.max(1, ...(r.byHost||[]).map(h => h.n));
  document.getElementById('byHost').innerHTML = (r.byHost||[]).length
    ? r.byHost.map(h => `
      <div class="bar-row"><span class="lbl" title="${esc(h.host)}">${esc(h.host)}</span>
        <span class="track"><span class="fill" style="width:${h.n/maxHost*100}%"></span></span>
        <span class="v">${h.n}</span></div>`).join('')
    : '<div class="empty">no data</div>';

  // daily trend (critical + warning stacked-ish, scaled to busiest day)
  const maxDay = Math.max(1, ...(r.byDay||[]).map(d => d.total));
  document.getElementById('byDay').innerHTML = (r.byDay||[]).length
    ? r.byDay.map(d => `
      <div class="bar-row day-row"><span class="lbl">${esc(d.day)}</span>
        <span class="track">
          <span class="fill crit" style="width:${(d.critical||0)/maxDay*100}%"></span>
        </span>
        <span class="v">${d.total}</span></div>`).join('')
    : '<div class="empty">no data</div>';

  // table
  const rows = r.alerts || [];
  document.getElementById('tbl-cnt').textContent = rows.length + ' shown' +
    (r.total > rows.length ? ' (of ' + r.total + ')' : '');
  document.getElementById('table-wrap').innerHTML = rows.length ? `
    <table>
      <thead><tr><th>Time</th><th>Severity</th><th>Host</th><th>Metric</th><th>Summary</th></tr></thead>
      <tbody>${rows.map(a => `
        <tr class="${a.dismissed ? 'dismissed' : ''}">
          <td class="when">${esc(fmt(a.time))}</td>
          <td><span class="sev ${esc(a.severity)}">${esc(a.severity)}</span></td>
          <td class="host">${esc(a.host)}</td>
          <td class="ttl">${esc(a.title)}</td>
          <td class="sum">${esc(a.summary)}${a.dismissed ? '<span class="tag">dismissed</span>' : ''}</td>
        </tr>`).join('')}</tbody>
    </table>` : '<div class="empty">no alerts in this period</div>';
}

// CSV export of the currently loaded rows
function downloadCsv(){
  if(!current || !(current.alerts||[]).length) return;
  const head = ['time','severity','host','metric','summary','dismissed'];
  const q = v => '"' + String(v==null?'':v).replace(/"/g,'""') + '"';
  const lines = [head.join(',')].concat(current.alerts.map(a =>
    [a.time, a.severity, a.host, a.title, a.summary, a.dismissed].map(q).join(',')));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'infrawatch-alerts.csv'; a.click();
  URL.revokeObjectURL(url);
}

// preset buttons
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;
  days = Number(btn.dataset.d);
  [...document.querySelectorAll('#presets button')].forEach(b => b.classList.toggle('on', b === btn));
  load();
});

load();
setInterval(load, 30000); // keep it fresh
</script>
</body>
</html>
